services:
  db:
    image: postgres:17-alpine
    container_name: narra-image-e2e-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${E2E_POSTGRES_DB:-narra_image_e2e}
      POSTGRES_USER: ${E2E_POSTGRES_USER:-narra_e2e}
      POSTGRES_PASSWORD: ${E2E_POSTGRES_PASSWORD:-narra_e2e_password}
    ports:
      - "${E2E_POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${E2E_POSTGRES_USER:-narra_e2e} -d ${E2E_POSTGRES_DB:-narra_image_e2e}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: narra-image-e2e-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${E2E_POSTGRES_USER:-narra_e2e}:${E2E_POSTGRES_PASSWORD:-narra_e2e_password}@db:5432/${E2E_POSTGRES_DB:-narra_image_e2e}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-replace-this-secret}
      APP_URL: ${E2E_APP_URL:-http://localhost:3100}
      BUILTIN_PROVIDER_BASE_URL: ${BUILTIN_PROVIDER_BASE_URL:-}
      BUILTIN_PROVIDER_API_KEY: ${BUILTIN_PROVIDER_API_KEY:-}
      BUILTIN_PROVIDER_MODEL: ${BUILTIN_PROVIDER_MODEL:-gpt-image-2}
      BUILTIN_PROVIDER_CREDIT_COST: ${BUILTIN_PROVIDER_CREDIT_COST:-5}
      BUILTIN_PROVIDER_NAME: ${BUILTIN_PROVIDER_NAME:-Studio}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      ENABLE_LOCAL_IMAGE_FALLBACK: ${ENABLE_LOCAL_IMAGE_FALLBACK:-true}
      EXTERNAL_GENERATION_WAIT_TIMEOUT_SECONDS: ${EXTERNAL_GENERATION_WAIT_TIMEOUT_SECONDS:-900}
      EXTERNAL_GENERATION_POLL_INTERVAL_MS: ${EXTERNAL_GENERATION_POLL_INTERVAL_MS:-1000}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_INVITE_CODE: ${BOOTSTRAP_INVITE_CODE:-FOUNDING-ACCESS}
      BOOTSTRAP_ADMIN_PASSWORD_HASH: ${BOOTSTRAP_ADMIN_PASSWORD_HASH:-}
    ports:
      - "${E2E_APP_PORT:-3100}:3000"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: narra-image-e2e-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${E2E_POSTGRES_USER:-narra_e2e}:${E2E_POSTGRES_PASSWORD:-narra_e2e_password}@db:5432/${E2E_POSTGRES_DB:-narra_image_e2e}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-replace-this-secret}
      APP_URL: ${E2E_APP_URL:-http://localhost:3100}
      BUILTIN_PROVIDER_BASE_URL: ${BUILTIN_PROVIDER_BASE_URL:-}
      BUILTIN_PROVIDER_API_KEY: ${BUILTIN_PROVIDER_API_KEY:-}
      BUILTIN_PROVIDER_MODEL: ${BUILTIN_PROVIDER_MODEL:-gpt-image-2}
      BUILTIN_PROVIDER_CREDIT_COST: ${BUILTIN_PROVIDER_CREDIT_COST:-5}
      BUILTIN_PROVIDER_NAME: ${BUILTIN_PROVIDER_NAME:-Studio}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      ENABLE_LOCAL_IMAGE_FALLBACK: ${ENABLE_LOCAL_IMAGE_FALLBACK:-true}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      WORKER_HTTP_ADDR: "${WORKER_HTTP_ADDR:-:8081}"
      WORKER_METRICS_WINDOW_MINUTES: ${WORKER_METRICS_WINDOW_MINUTES:-1440}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-1000}
      WORKER_JOB_TIMEOUT_SECONDS: ${WORKER_JOB_TIMEOUT_SECONDS:-900}
      WORKER_MAX_ATTEMPTS: ${WORKER_MAX_ATTEMPTS:-2}
    healthcheck:
      test: ["CMD-SHELL", "port=$${WORKER_HTTP_ADDR##*:}; wget -qO- \"http://127.0.0.1:$${port}/healthz\" >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_e2e_data:
